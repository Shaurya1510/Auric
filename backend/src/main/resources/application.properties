# ─── Server ───────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0
spring.config.import=optional:file:.env[.properties]
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# ─── SQLite Database ──────────────────────────────────────
spring.datasource.url=jdbc:sqlite:auric.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── AI Settings ───────────────────────────────────────────
# Enable lightweight web research snippets in detailed mode
ai.web.research.enabled=true
# Per-user token usage quota in a rolling window.
# Set <= 0 to disable quota checks.
ai.usage.limit.tokens=${AI_USAGE_LIMIT_TOKENS:20000}
ai.usage.window.hours=${AI_USAGE_WINDOW_HOURS:6}

# ─── OpenAI ───────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY:}
openai.base.url=https://api.openai.com/v1
# Stable default text model (override via OPENAI_MODEL)
openai.model=${OPENAI_MODEL:gpt-5.4-mini}
# High-quality vision model (override via OPENAI_VISION_MODEL)
openai.vision.model=${OPENAI_VISION_MODEL:gpt-5.4-mini}
# Fast mode is capped at 1500, detailed mode at 4000 (see OpenAiService)
openai.max.tokens=4096
openai.connect-timeout-ms=5000
# Generous timeout for longer responses (step-by-step math etc)
openai.response-timeout-sec=120

# ─── Google OAuth2 ────────────────────────────────────────
# Set GOOGLE_CLIENT_ID environment variable before running
google.client.id=${GOOGLE_CLIENT_ID:432958367549-9rfitbk3vboglopqeu966kg4r1k6kmom.apps.googleusercontent.com}
# Optional comma-separated audience list (web + android + ios client IDs)
google.client.ids=${GOOGLE_CLIENT_IDS:${google.client.id},432958367549-81srm9n61s068vbjb3ourmbad8a1goq1.apps.googleusercontent.com}

# ─── CORS ─────────────────────────────────────────────────
# Add your production URL here if deploying
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

# ─── Logging ──────────────────────────────────────────────
logging.level.com.auric=INFO
logging.level.org.springframework.security=WARN
